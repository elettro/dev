<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stashbox Sampler</title>
  <style>
    :root {
      --bg: #111111;
      --panel: #18181b;
      --border: #27272a;
      --muted: #a1a1aa;
      --muted-2: #71717a;
      --text: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .sampler {
      width: 100%;
      max-width: 760px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      padding: 32px;
      text-align: center;
    }

    .title {
      margin: 0 0 8px 0;
      font-size: 42px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -1px;
      text-transform: uppercase;
      font-style: italic;
    }

    .title span {
      color: var(--muted-2);
    }

    .subtitle {
      margin: 0 0 28px 0;
      font-size: 13px;
      color: var(--muted);
      font-family: Consolas, Monaco, monospace;
    }

    .pads {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }

    .pad {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 0;
      border-bottom: 4px solid rgba(0, 0, 0, 0.2);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      transition: transform 0.08s ease, filter 0.08s ease, box-shadow 0.08s ease;
      color: rgba(0, 0, 0, 0.82);
      padding: 8px;
    }

    .pad:hover {
      filter: brightness(1.08);
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.22);
    }

    .pad.active {
      transform: scale(0.95) translateY(2px);
      border-bottom-width: 0;
      filter: brightness(1.2);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.24);
    }

    .pad-key {
      font-size: 30px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 6px;
    }

    .pad-name {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.4px;
      line-height: 1.2;
    }

    .unlock {
      margin-top: 24px;
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--muted-2);
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.45; }
      50% { opacity: 1; }
      100% { opacity: 0.45; }
    }

    @media (max-width: 640px) {
      .sampler {
        padding: 24px;
      }

      .title {
        font-size: 32px;
      }

      .pads {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="sampler" id="sampler">
    <h1 class="title">Stashbox <span>Sampler</span></h1>
    <p class="subtitle">Click to activate • Use keys [Q W E R A S D F]</p>
    <section class="pads" id="pads" aria-label="Sampler pads"></section>
    <div class="unlock" id="unlockMsg">Tap anywhere to unlock audio</div>
  </main>

  <script>
    const SAMPLES = [
      { key: "Q", name: "Kick", color: "#FF4D4D", freq: 60 },
      { key: "W", name: "Snare", color: "#4D79FF", freq: 200 },
      { key: "E", name: "Hi-Hat", color: "#FFD700", freq: 8000 },
      { key: "R", name: "Clap", color: "#32CD32", freq: 1000 },
      { key: "A", name: "Synth 1", color: "#DA70D6", freq: 440 },
      { key: "S", name: "Synth 2", color: "#00CED1", freq: 523.25 },
      { key: "D", name: "Bass", color: "#FF8C00", freq: 82.41 },
      { key: "F", name: "Vibe", color: "#8A2BE2", freq: 329.63 }
    ];

    let audioCtx = null;
    let clearActiveTimer = null;

    const sampler = document.getElementById("sampler");
    const padsContainer = document.getElementById("pads");
    const unlockMsg = document.getElementById("unlockMsg");

    function initAudio() {
      if (!audioCtx) {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) {
          unlockMsg.textContent = "Web Audio API is not supported in this browser";
          return;
        }
        audioCtx = new AudioContextClass();
        unlockMsg.style.display = "none";
      } else if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
    }

    function clearActivePads() {
      document.querySelectorAll(".pad.active").forEach((pad) => {
        pad.classList.remove("active");
      });
    }

    function setActiveKey(key) {
      clearActivePads();
      const activePad = document.querySelector('.pad[data-key="' + key + '"]');
      if (activePad) {
        activePad.classList.add("active");
      }

      if (clearActiveTimer) {
        clearTimeout(clearActiveTimer);
      }

      clearActiveTimer = setTimeout(() => {
        clearActivePads();
      }, 100);
    }

    function playTone(freq, key) {
      if (!audioCtx) return;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "sine";
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

      gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start();
      osc.stop(audioCtx.currentTime + 0.5);

      setActiveKey(key);
    }

    function triggerSample(sample) {
      initAudio();
      playTone(sample.freq, sample.key);
    }

    SAMPLES.forEach((sample) => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "pad";
      button.dataset.key = sample.key;
      button.style.backgroundColor = sample.color;
      button.setAttribute("aria-label", sample.name + " pad on key " + sample.key);

      button.innerHTML = `
        <div class="pad-key">${sample.key}</div>
        <div class="pad-name">${sample.name}</div>
      `;

      button.addEventListener("mousedown", () => triggerSample(sample));
      button.addEventListener("touchstart", () => triggerSample(sample), { passive: true });

      padsContainer.appendChild(button);
    });

    window.addEventListener("keydown", (event) => {
      const key = event.key.toUpperCase();
      const sample = SAMPLES.find((item) => item.key === key);
      if (sample) {
        triggerSample(sample);
      }
    });

    sampler.addEventListener("click", initAudio);
  </script>
</body>
</html>
