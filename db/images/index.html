<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>10 Dropbox Carousel Examples</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121933;
      --panel-2: #192142;
      --text: #f5f7ff;
      --muted: #aab3d1;
      --line: rgba(255,255,255,0.09);
      --accent: #5aa9ff;
      --radius: 22px;
      --shadow: 0 20px 50px rgba(0,0,0,0.28);
      --maxw: 1320px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: linear-gradient(180deg, #09101e 0%, #0d1430 100%);
      color: var(--text);
      font-family: Inter, Arial, Helvetica, sans-serif;
    }

    body {
      padding: 32px 18px 60px;
    }

    a { color: inherit; }

    .wrap {
      max-width: var(--maxw);
      margin: 0 auto;
    }

    .hero {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 28px;
      margin-bottom: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    h1 {
      font-size: clamp(30px, 4vw, 54px);
      line-height: 1;
      margin: 0 0 12px;
      letter-spacing: -0.03em;
    }

    .hero p {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
      margin: 0;
      max-width: 960px;
    }

    .note {
      margin-top: 16px;
      padding: 16px 18px;
      background: rgba(90,169,255,0.08);
      border: 1px solid rgba(90,169,255,0.18);
      border-radius: 16px;
      color: #dbe8ff;
      font-size: 14px;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px;
    }

    .card {
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      min-width: 0;
    }

    .card-header {
      padding: 18px 18px 12px;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      color: #8ebeff;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      margin-bottom: 8px;
    }

    h2 {
      margin: 0;
      font-size: 22px;
      letter-spacing: -0.02em;
    }

    .sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .carousel {
      position: relative;
      aspect-ratio: 16 / 10;
      background: #05070e;
      overflow: hidden;
    }

    .carousel.tall { aspect-ratio: 9 / 16; }
    .carousel.square { aspect-ratio: 1 / 1; }
    .carousel.slim { aspect-ratio: 16 / 7; }

    .track {
      display: flex;
      height: 100%;
      transition: transform 0.55s ease;
      will-change: transform;
    }

    .slide {
      min-width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
      background: #000;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .caption {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 16px;
      background: rgba(8,12,24,0.55);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 12px 14px;
      backdrop-filter: blur(6px);
      font-size: 14px;
    }

    .controls {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .btn {
      pointer-events: auto;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      border: 0;
      background: rgba(7,10,18,0.72);
      color: white;
      width: 42px;
      height: 42px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.22);
      backdrop-filter: blur(8px);
    }

    .btn:hover { background: rgba(20,28,50,0.92); }
    .btn.prev { left: 12px; }
    .btn.next { right: 12px; }

    .dots {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 3;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.33);
      border: 0;
      cursor: pointer;
      padding: 0;
    }

    .dot.active { background: white; }

    .thumbs {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      padding: 12px;
      background: rgba(255,255,255,0.025);
      border-top: 1px solid var(--line);
    }

    .thumbs button {
      appearance: none;
      border: 1px solid var(--line);
      background: transparent;
      border-radius: 12px;
      overflow: hidden;
      padding: 0;
      cursor: pointer;
      aspect-ratio: 1 / 1;
    }

    .thumbs img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0.72;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .thumbs button.active img,
    .thumbs button:hover img {
      opacity: 1;
      transform: scale(1.04);
    }

    .filmstrip {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 14px;
      scrollbar-width: thin;
      border-top: 1px solid var(--line);
      background: rgba(255,255,255,0.025);
    }

    .filmstrip button {
      flex: 0 0 120px;
      height: 76px;
      border-radius: 12px;
      border: 1px solid var(--line);
      overflow: hidden;
      background: transparent;
      padding: 0;
      cursor: pointer;
    }

    .filmstrip img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0.76;
    }

    .filmstrip button.active img { opacity: 1; }

      height: 100%;
    }
